<div
  class="pointer-events-none fixed right-4 top-4 z-50 flex w-[calc(100vw-2rem)] max-w-sm flex-col gap-3"
  aria-live="polite"
  aria-atomic="true"
>
  @for (toast of toasts(); track trackByToast($index, toast)) {
    <div
      class="pointer-events-auto app-surface app-fade-in border bg-white p-4"
      [class]="getClasses(toast.type)"
      role="status"
    >
      <div class="flex items-start gap-3">
        <div class="min-w-0 flex-1">
          <p class="text-xs font-bold uppercase tracking-[0.16em]">
            {{ getLabel(toast.type) }}
          </p>
          <p class="mt-2 text-sm leading-6">
            {{ toast.message }}
          </p>
        </div>

        <button
          type="button"
          (click)="remove(toast.id)"
          class="border px-2 py-1 text-xs font-bold uppercase tracking-[0.14em] transition"
          [class]="getCloseButtonClasses(toast.type)"
          aria-label="Cerrar notificacion"
        >
          X
        </button>
      </div>
    </div>
  }
</div>

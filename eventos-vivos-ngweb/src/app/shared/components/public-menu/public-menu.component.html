<nav class="relative z-50 border-b border-black/30 bg-white">
  <div
    class="mx-auto flex max-w-[1200px] flex-col gap-4 px-4 py-4 md:flex-row md:items-center md:justify-between md:px-6 lg:px-12"
  >
    <div class="flex items-center justify-between gap-4">
      <a
        routerLink="/eventos"
        class="text-xl font-extrabold tracking-[-0.03em] text-black transition hover:text-[#0052D1]"
      >
        EventosVivos
      </a>

      @if (estaAutenticado()) {
        <button
          type="button"
          (click)="alternarPerfil()"
          class="flex cursor-pointer items-center gap-3 border border-black/30 bg-white px-3 py-2 md:hidden"
          [attr.aria-expanded]="perfilAbierto()"
          aria-label="Abrir menú de perfil"
        >
          @if (fotoPerfil()) {
            <img
              [src]="fotoPerfil()"
              [alt]="'Foto de ' + nombreUsuario()"
              class="h-8 w-8 border border-black/30 object-cover"
              referrerpolicy="no-referrer"
            />
          } @else {
            <div class="flex h-8 w-8 items-center justify-center border border-black/30 bg-[#F2F2F2] text-xs font-bold uppercase text-black">
              {{ nombreUsuario().slice(0, 1) }}
            </div>
          }
          <span class="text-xs font-bold uppercase tracking-[0.14em] text-black">Perfil</span>
        </button>
      }
    </div>

    <div class="flex flex-col gap-4 md:flex-row md:items-center md:gap-6">
      <div class="flex flex-col gap-2 md:flex-row md:items-center md:gap-5">
        <a
          routerLink="/eventos"
          routerLinkActive="text-[#0052D1]"
          [routerLinkActiveOptions]="{ exact: true }"
          class="text-sm font-bold uppercase tracking-[0.14em] text-black transition hover:text-[#0052D1]"
        >
          Eventos
        </a>

        @if (!estaAutenticado()) {
          <a
            routerLink="/login"
            routerLinkActive="text-[#0052D1]"
            class="text-sm font-bold uppercase tracking-[0.14em] text-black transition hover:text-[#0052D1]"
          >
            Login
          </a>
        }
      </div>

      @if (estaAutenticado()) {
        <div class="relative z-50">
          <button
            type="button"
            (click)="alternarPerfil()"
            class="hidden cursor-pointer items-center gap-3 bg-white px-3 py-2 md:flex"
            [attr.aria-expanded]="perfilAbierto()"
            aria-label="Abrir menú de perfil"
          >
            @if (fotoPerfil()) {
              <img
                [src]="fotoPerfil()"
                [alt]="'Foto de ' + nombreUsuario()"
                class="h-10 w-10 border object-cover"
                referrerpolicy="no-referrer"
              />
            } @else {
              <div class="flex h-10 w-10 items-center justify-center bg-[#F2F2F2] text-sm font-bold uppercase text-black">
                {{ nombreUsuario().slice(0, 1) }}
              </div>
            }

            <div class="min-w-0 text-left">
              <p class="text-xs font-bold uppercase tracking-[0.16em] text-[#0052D1]">
                Mi perfil
              </p>
              <p class="max-w-[180px] truncate text-sm font-semibold text-black">
                {{ nombreUsuario() }}
              </p>
            </div>
          </button>

          @if (perfilAbierto()) {
            <div
              class="z-50 mt-3 border border-black/30 bg-white p-4 md:absolute md:right-0 md:mt-2 md:w-[280px]"
            >
              <div class="flex items-center gap-3 border-b border-[#D1D1D1] pb-4">
                @if (fotoPerfil()) {
                  <img
                    [src]="fotoPerfil()"
                    [alt]="'Foto de ' + nombreUsuario()"
                    class="h-12 w-12 border border-black/30 object-cover"
                    referrerpolicy="no-referrer"
                  />
                } @else {
                  <div class="flex h-12 w-12 items-center justify-center border border-black/30 bg-[#F2F2F2] text-sm font-bold uppercase text-black">
                    {{ nombreUsuario().slice(0, 1) }}
                  </div>
                }

                <div class="min-w-0">
                  <p class="text-xs font-bold uppercase tracking-[0.16em] text-[#0052D1]">
                    Sesión activa
                  </p>
                  <p class="truncate text-sm font-semibold text-black">
                    {{ nombreUsuario() }}
                  </p>
                </div>
              </div>

              <div class="mt-4 flex flex-col gap-2">
                <a
                  routerLink="/mis-reservas"
                  routerLinkActive="text-[#0052D1]"
                  (click)="cerrarPerfil()"
                  class="border border-[#D1D1D1] bg-white px-4 py-3 text-sm font-semibold text-black transition hover:bg-[#F2F2F2]"
                >
                  Mis reservas
                </a>
                <a
                  routerLink="/mi-cuenta"
                  routerLinkActive="text-[#0052D1]"
                  (click)="cerrarPerfil()"
                  class="border border-[#D1D1D1] bg-white px-4 py-3 text-sm font-semibold text-black transition hover:bg-[#F2F2F2]"
                >
                  Mis datos
                </a>
                <button
                  type="button"
                  (click)="cerrarSesion()"
                  class="min-h-11 border border-black/30 bg-white px-4 py-3 text-sm font-bold uppercase tracking-[0.14em] text-black transition hover:bg-[#F2F2F2] focus:border-2 focus:border-black/30"
                >
                  Cerrar sesión
                </button>
              </div>
            </div>
          }
        </div>
      }
    </div>
  </div>
</nav>

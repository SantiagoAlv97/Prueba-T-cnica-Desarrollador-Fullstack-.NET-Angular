<section class="relative overflow-hidden bg-[#F2F2F2] px-4 py-10 md:px-6 md:py-14 lg:px-12">

  <div class="mx-auto flex min-h-[calc(100vh-12rem)] max-w-[1200px] flex-col">
    <div class="flex items-center justify-between py-2">
      <a
        routerLink="/eventos"
        class="text-sm font-bold uppercase tracking-[0.14em] text-black transition hover:text-[#0052D1]"
      >
        Volver al inicio
      </a>
    </div>

    <div class="flex flex-1 items-center justify-center py-10">
      <div class="w-full max-w-[560px] border border-black/30 bg-white p-6 md:p-10">
        <div class="text-center">
          <p class="text-xs font-bold uppercase tracking-[0.16em] text-[#0052D1]">
            Acceso seguro
          </p>
          <h1 class="mt-3 text-4xl font-extrabold tracking-[-0.03em] text-black md:text-5xl">
            Iniciar sesión
          </h1>
          <p class="mt-4 text-base leading-7 text-black/78">
            Accede con Google para reservar eventos y gestionar tu cuenta.
          </p>
        </div>

        <div class="mt-10">
          <div class="bg-white p-5">
            <div class="flex justify-center">
              <div #googleButton class="google-button-host"></div>
            </div>

            @if (cargando()) {
              <div class="mt-6 border border-[#D1D1D1] bg-[#F2F2F2] px-4 py-4 text-center">
                <p class="text-xs font-bold uppercase tracking-[0.16em] text-[#0052D1]">
                  Validando acceso
                </p>
                <p class="mt-2 text-sm leading-6 text-black/78">
                  Estamos iniciando tu sesión con Google...
                </p>
              </div>
            }
          </div>
        </div>
      </div>
    </div>

    <footer class="border border-black/30 bg-white px-6 py-5">
      <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
        <p class="text-2xl font-extrabold tracking-[-0.03em] text-black">Eventos Vivos</p>
        <div class="flex flex-wrap gap-4 text-sm text-black/75">
          <span>Términos</span>
          <span>Privacidad</span>
          <span>Soporte</span>
          <span>Contacto</span>
        </div>
        <p class="text-sm text-black/75">© 2026 Eventos Vivos. Functional Minimalism.</p>
      </div>
    </footer>
  </div>
</section>

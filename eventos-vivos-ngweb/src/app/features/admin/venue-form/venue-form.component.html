<section class="app-surface border border-black/30 bg-white p-5 md:p-6">
  <div class="border-b border-[#D1D1D1] pb-4">
    <p class="text-xs font-bold uppercase tracking-[0.16em] text-[#0052D1]">Formulario</p>
    <h2 class="mt-2 text-2xl font-extrabold tracking-[-0.03em] text-black">{{ title() }}</h2>
  </div>

  <form [formGroup]="form" (ngSubmit)="submit()" class="mt-5 grid gap-4">
    <div>
      <label class="mb-2 block text-xs font-bold uppercase tracking-[0.14em] text-black">Nombre</label>
      <input formControlName="nombre" class="min-h-12 w-full border border-black/30 bg-white px-4 py-3 text-sm outline-none focus:border-2 focus:border-black/30" />
    </div>
    <div>
      <label class="mb-2 block text-xs font-bold uppercase tracking-[0.14em] text-black">Ciudad</label>
      <input formControlName="ciudad" class="min-h-12 w-full border border-black/30 bg-white px-4 py-3 text-sm outline-none focus:border-2 focus:border-black/30" />
    </div>
    <div>
      <label class="mb-2 block text-xs font-bold uppercase tracking-[0.14em] text-black">Capacidad</label>
      <input type="number" min="1" formControlName="capacidad" class="min-h-12 w-full border border-black/30 bg-white px-4 py-3 text-sm outline-none focus:border-2 focus:border-black/30" />
    </div>
    <div class="flex flex-col gap-3 border-t border-[#D1D1D1] pt-5 sm:flex-row">
      <button type="submit" class="min-h-12 border border-black/30 bg-black px-5 py-3 text-sm font-bold uppercase tracking-[0.14em] text-white">
        {{ submitting() ? 'Guardando...' : submitLabel() }}
      </button>
      <button type="button" (click)="cancel()" class="min-h-12 border border-black/30 bg-white px-5 py-3 text-sm font-bold uppercase tracking-[0.14em] text-black">
        Cancelar
      </button>
    </div>
  </form>
</section>
